<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="HomePulse — monitor Proxmox, Docker, media services, and streaming activity">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>HomePulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/settings.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9783;</text></svg>">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="header-logo">H</div>
      <h1>HomePulse</h1>
      <span id="last-updated" class="last-updated"></span>
    </div>
    <div class="header-right">
      <div class="status-dot" title="Connected"></div>
      <button id="refresh-btn" class="refresh-btn" title="Refresh all">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        Refresh
      </button>
      <button id="settings-btn" class="settings-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      <button id="chat-toggle" class="chat-toggle-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        OpenClaw
      </button>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="main-container">
    <div id="dashboard" class="dashboard">

      <!-- Proxmox Section -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon proxmox">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
              <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
              <line x1="6" y1="6" x2="6.01" y2="6"></line>
              <line x1="6" y1="18" x2="6.01" y2="18"></line>
            </svg>
          </div>
          <span class="section-title">Proxmox VE</span>
        </div>
        <div id="proxmox-content">
          <div class="loading-skeleton"></div>
        </div>
      </div>

      <!-- Docker Section -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon docker">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 12H2"></path>
              <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path>
              <line x1="6" y1="16" x2="6.01" y2="16"></line>
              <line x1="10" y1="16" x2="10.01" y2="16"></line>
            </svg>
          </div>
          <span class="section-title">Docker Containers</span>
          <span id="docker-badge" class="section-badge">...</span>
        </div>
        <div id="docker-content">
          <div class="loading-skeleton"></div>
        </div>
      </div>

      <!-- Arr Suite Section -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon arr">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="23 7 16 12 23 17 23 7"></polygon>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
          </div>
          <span class="section-title">Media Library</span>
        </div>
        <div id="arr-content">
          <div class="loading-skeleton"></div>
        </div>
      </div>

      <!-- Streaming Section -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon streaming">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polygon points="10 8 16 12 10 16 10 8"></polygon>
            </svg>
          </div>
          <span class="section-title">Active Streams</span>
          <span id="streaming-badge" class="section-badge">...</span>
        </div>
        <div id="streaming-content">
          <div class="loading-skeleton"></div>
        </div>
      </div>

    </div>

    <!-- Chat Panel -->
    <div id="chat-panel" class="chat-panel">
      <div class="chat-header">
        <div class="chat-header-left">
          <div class="chat-avatar">OC</div>
          <div>
            <div class="chat-title">OpenClaw Assistant</div>
            <div id="chat-status" class="chat-status">Checking...</div>
          </div>
        </div>
        <button id="chat-close" class="chat-close">&times;</button>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-area">
        <textarea id="chat-input" class="chat-input" placeholder="Ask OpenClaw anything..." rows="1"></textarea>
        <button id="chat-send" class="chat-send" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Settings Overlay -->
  <div id="settings-overlay" class="settings-overlay hidden">
    <div class="settings-container">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="settings-close" class="chat-close">&times;</button>
      </div>

      <!-- Login Form (shown when not authenticated) -->
      <div id="settings-login" class="settings-login">
        <div id="setup-notice" class="setup-notice hidden">
          <strong>Welcome to HomePulse!</strong><br>Create your admin account to get started.
        </div>
        <div class="settings-form-group">
          <label>Username</label>
          <input type="text" id="auth-username" class="settings-input" autocomplete="username">
        </div>
        <div class="settings-form-group">
          <label>Password</label>
          <input type="password" id="auth-password" class="settings-input" autocomplete="current-password">
        </div>
        <button id="auth-submit" class="settings-save-btn">Login</button>
        <div id="auth-error" class="settings-error hidden"></div>
      </div>

      <!-- Settings Panel (shown when authenticated as admin) -->
      <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-user-bar">
          Logged in as <strong id="settings-username"></strong>
          <button id="settings-logout" class="settings-logout-btn">Logout</button>
        </div>

        <div class="settings-tabs">
          <button class="settings-tab active" data-tab="ui">Appearance</button>
          <button class="settings-tab" data-tab="services">Services</button>
          <button class="settings-tab" data-tab="users">Accounts</button>
        </div>

        <!-- UI Tab -->
        <div id="tab-ui" class="settings-tab-content active">
          <div class="settings-section">
            <h3>Colors</h3>
            <div class="color-grid">
              <div class="settings-form-group">
                <label>Accent</label>
                <input type="color" id="ui-accent-color" class="settings-color-input">
              </div>
              <div class="settings-form-group">
                <label>Background</label>
                <input type="color" id="ui-bg-primary" class="settings-color-input">
              </div>
              <div class="settings-form-group">
                <label>Sidebar</label>
                <input type="color" id="ui-bg-secondary" class="settings-color-input">
              </div>
              <div class="settings-form-group">
                <label>Cards</label>
                <input type="color" id="ui-bg-card" class="settings-color-input">
              </div>
              <div class="settings-form-group">
                <label>Text</label>
                <input type="color" id="ui-text-primary" class="settings-color-input">
              </div>
            </div>
          </div>
          <div class="settings-section">
            <h3>Font</h3>
            <select id="ui-font-family" class="settings-select">
              <option value="Inter">Inter</option>
              <option value="JetBrains Mono">JetBrains Mono</option>
              <option value="system-ui">System Default</option>
              <option value="Roboto">Roboto</option>
              <option value="Fira Sans">Fira Sans</option>
            </select>
          </div>
          <div class="settings-section">
            <h3>Card Density</h3>
            <div class="density-options">
              <label class="density-option"><input type="radio" name="density" value="comfortable" checked> Comfortable</label>
              <label class="density-option"><input type="radio" name="density" value="compact"> Compact</label>
            </div>
          </div>
          <div class="settings-section">
            <h3>Section Order</h3>
            <div id="section-order-list" class="section-order-list"></div>
          </div>
          <div class="settings-actions">
            <button id="ui-save" class="settings-save-btn">Save Changes</button>
            <button id="ui-reset" class="settings-reset-btn">Reset to Defaults</button>
          </div>
        </div>

        <!-- Services Tab -->
        <div id="tab-services" class="settings-tab-content">
          <div id="services-form"></div>
          <div class="settings-actions">
            <button id="services-save" class="settings-save-btn">Save Changes</button>
          </div>
        </div>

        <!-- Users Tab -->
        <div id="tab-users" class="settings-tab-content">
          <div id="users-list"></div>
          <h3 style="margin-top:20px">Add User</h3>
          <div class="settings-form-group">
            <label>Username</label>
            <input type="text" id="new-username" class="settings-input" autocomplete="off">
          </div>
          <div class="settings-form-group">
            <label>Password</label>
            <input type="password" id="new-password" class="settings-input" autocomplete="new-password">
          </div>
          <div class="settings-form-group">
            <label class="density-option"><input type="checkbox" id="new-is-admin"> Admin privileges</label>
          </div>
          <button id="add-user-btn" class="settings-save-btn">Create User</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/settings.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
