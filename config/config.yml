# HomePulse Configuration
# Display settings loaded at startup. Safe to commit — no secrets.

dashboard:
  title: "HomePulse"
  refresh_interval: 30  # seconds

# Section visibility & order is owned by the admin Settings panel
# (stored in the SQLite ui_settings.section_order column). If a section
# is missing from that list it stays in its default DOM position. There
# is deliberately no YAML-level toggle here — having two sources of
# truth led to undefined precedence.

# Custom labels for Docker containers (optional)
# Maps container name to a friendly display name
docker_labels:
  plex: "Plex Media Server"
  radarr: "Radarr"
  sonarr: "Sonarr"
  tautulli: "Tautulli"

# Custom URLs for Docker containers (optional)
# Maps container name to the URL opened when the ↗ icon is clicked.
# Leave empty {} to auto-build a URL from the first exposed host port.
# Example:
#   plex: "https://plex.example.com"
#   jellyfin: "http://192.168.1.50:8096"
docker_links: {}
