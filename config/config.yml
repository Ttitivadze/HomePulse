# HomePulse Configuration
# Service-level overrides and display settings

dashboard:
  title: "HomePulse"
  refresh_interval: 30  # seconds

# Toggle which sections are visible
sections:
  proxmox: true
  docker: true
  arr_suite: true
  streaming: true
  uptime_kuma: true
  infrastructure: true
  claude_chat: true

# Custom labels for Docker containers (optional)
# Maps container name to a friendly display name
docker_labels:
  plex: "Plex Media Server"
  radarr: "Radarr"
  sonarr: "Sonarr"
  tautulli: "Tautulli"

# Custom URLs for Docker containers (optional)
# Maps container name to the URL opened when the ↗ icon is clicked.
# Leave empty {} to auto-build a URL from the first exposed host port.
# Example:
#   plex: "https://plex.example.com"
#   jellyfin: "http://192.168.1.50:8096"
docker_links: {}
