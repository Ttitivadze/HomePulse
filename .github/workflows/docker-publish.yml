name: docker-publish

# Publishes the HomePulse image to ghcr.io on every push to main and on
# tagged releases. End users pull it with
#   docker pull ghcr.io/ttitivadze/homepulse:latest
# instead of cloning + docker build.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push (linux/amd64, linux/arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # docker-metadata-action lowercases the image reference
          # automatically, so a mixed-case repo name won't break push.
          images: ghcr.io/${{ github.repository }}
          tags: |
            # main branch -> `latest`
            type=raw,value=latest,enable={{is_default_branch}}
            # Tagged releases -> full semver (e.g. 2.1.0) and the major.minor
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Every commit on main -> short sha for rollback
            type=sha,format=short,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
