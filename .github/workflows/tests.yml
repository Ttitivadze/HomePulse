name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel an in-progress run on the same ref when a new commit lands.
  # Main keeps its own group so a push never cancels a PR run and vice
  # versa.
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        env:
          # Deterministic JWT secret so auth tests don't rely on the
          # ephemeral secret the app would otherwise generate.
          JWT_SECRET: ci-test-secret-do-not-reuse
        run: pytest tests/ -q
