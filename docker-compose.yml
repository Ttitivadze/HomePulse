services:
  homepulse:
    build: .
    container_name: homepulse
    restart: unless-stopped
    ports:
      - "8450:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/config.yml:/app/config/config.yml:ro
      - homepulse_data:/app/data
    env_file:
      - .env
    environment:
      - TZ=UTC
      - PYTHONUNBUFFERED=1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  homepulse_data:
