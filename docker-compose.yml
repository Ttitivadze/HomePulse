version: "3.8"

services:
  homelab-dashboard:
    build: .
    container_name: homelab-dashboard
    restart: unless-stopped
    ports:
      - "8450:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/config.yml:/app/config/config.yml:ro
    env_file:
      - .env
    environment:
      - TZ=UTC
